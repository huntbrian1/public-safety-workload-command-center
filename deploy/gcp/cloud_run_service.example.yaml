apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: public-safety-demand-intelligence
spec:
  template:
    spec:
      containers:
        - image: gcr.io/<project-id>/public-safety-demand-intelligence:latest
          ports:
            - containerPort: 8501
          env:
            - name: SAMPLE_MODE
              value: "true"
            - name: SQLITE_DB_PATH
              value: "data/processed/public_safety_ops.sqlite"
